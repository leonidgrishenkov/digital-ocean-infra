#cloud-config
users:
  - name: ${user_name}
    groups: sudo,docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    hashed_passwd: ${user_passwd}
    lock_passwd: false
    shell: /bin/bash
    ssh_authorized_keys:
      - ${user_ssh_key}

write_files:
  - path: /etc/ssh/sshd_config.d/extra.conf
    content: |
      AllowUsers ${user_name}
      PermitRootLogin no
      PasswordAuthentication no
      Port 51222
    owner: root:root
    permissions: '0644'

  - path: /etc/profile.d/extra.sh
    content: |
      export ENV="dev"
    owner: root:root
    permissions: '0644'
